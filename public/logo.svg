<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="hyperGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#2E5CFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
            <feOffset dx="0" dy="4" result="offsetBlur"/>
            <feFlood flood-color="#000000" flood-opacity="0.15" result="offsetColor"/>
            <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="offsetBlur"/>
            <feMerge>
                <feMergeNode in="offsetBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="32" y="32" width="448" height="448" rx="110" fill="#FFFFFF" filter="url(#softShadow)"/>

    <g transform="translate(110, 110) scale(0.6)">
        <path d="M53.7 267.3L180.1 393.7L345.4 119.6L219 23.2L53.7 267.3Z" fill="url(#hyperGradient)" opacity="0.6"/>
        <path d="M117.3 330.9L243.7 457.3L409 183.2L282.6 86.8L117.3 330.9Z" fill="url(#hyperGradient)" opacity="0.8"/>
        <path d="M180.9 394.5L307.3 520.9L472.6 246.8L346.2 150.4L180.9 394.5Z" fill="url(#hyperGradient)"/>
    </g>
</svg>